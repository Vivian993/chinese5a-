<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>國語線上字典學習系統</title>
  
  <!-- 📌 iPhone 桌面 App 圖示：它會去抓您上傳到 GitHub 的 custom-icon.png 照片 -->
  <link rel="apple-touch-icon" href="custom-icon.png">
  <link rel="icon" type="image/png" href="custom-icon.png">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800;900&display=swap');
    
    :root {
      /* 🍬 馬卡龍甜美色系 */
      --bg-color: #FFF0F5; /* 淺粉背景 */
      --card-bg: #FFFFFF;
      --macaron-pink: #FFB7B2;
      --macaron-blue: #B5EAD7;
      --macaron-green: #E2F0CB;
      --macaron-yellow: #FFDAC1;
      --macaron-purple: #CBAACB;
      --text-main: #5D5D5D;
      --text-light: #888888;
      --border-color: #F8D8E8;
      --danger: #FF9AA2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 3rem; overflow-x: hidden;}
    
    /* === 標題區塊 === */
    header { background: linear-gradient(135deg, var(--card-bg) 0%, var(--border-color) 100%); padding: 1.5rem 1rem; border-bottom: 3px dashed var(--macaron-pink); box-shadow: 0 4px 10px rgba(255, 183, 178, 0.2); }
    .header-container { max-width: 1000px; margin: 0 auto; text-align: center; }
    h1 { font-size: 1.6rem; font-weight: 900; color: #D48C9E; margin-bottom: 0.3rem; }
    .subtitle { font-size: 1rem; font-weight: 700; color: #A4A4A4; margin-bottom: 1rem; }
    
    .meta-input-group { display: flex; justify-content: center; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .meta-input { border: 2px solid var(--macaron-pink); border-radius: 20px; padding: 0.5rem 1rem; font-size: 1rem; font-weight: 700; color: var(--text-main); text-align: center; width: 250px; outline: none; background: #fff;}
    .meta-select { border: 2px solid var(--macaron-blue); border-radius: 20px; padding: 0.5rem; font-size: 0.9rem; font-weight: 700; color: var(--text-main); outline: none; background: #fff; cursor: pointer; }

    /* === 導覽列 === */
    nav { background-color: white; border-bottom: 2px solid var(--border-color); position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .nav-container { max-width: 1000px; margin: 0 auto; display: flex; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
    .nav-container::-webkit-scrollbar { display: none; }
    .nav-btn { padding: 1rem 1.2rem; font-size: 0.95rem; font-weight: 800; background: none; border: none; border-bottom: 4px solid transparent; color: var(--text-light); cursor: pointer; transition: 0.3s; }
    .nav-btn.active { color: #D48C9E; border-bottom-color: var(--macaron-pink); }

    main { max-width: 1000px; margin: 0 auto; padding: 1rem; flex-grow: 1; width: 100%; }

    /* === 共用按鈕與表單 === */
    .btn { padding: 0.5rem 1rem; font-size: 0.9rem; font-weight: 700; border-radius: 20px; border: none; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .btn:active { transform: scale(0.95); }
    .btn-pink { background-color: var(--macaron-pink); color: #fff; }
    .btn-blue { background-color: var(--macaron-blue); color: #5D5D5D; }
    .btn-green { background-color: var(--macaron-green); color: #5D5D5D; }
    .btn-yellow { background-color: var(--macaron-yellow); color: #5D5D5D; }
    .input-box, .textarea-box, .select-box { width: 100%; border: 2px solid var(--border-color); border-radius: 12px; padding: 0.6rem; font-size: 0.9rem; outline: none; background: #fff; transition: 0.3s; }
    .input-box:focus, .textarea-box:focus { border-color: var(--macaron-pink); }

    /* === 課文與生字區塊 === */
    .filter-bar { background: #fff; border-radius: 20px; padding: 0.8rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
    
    .lesson-section { display: none; margin-bottom: 2rem; animation: fadeIn 0.3s ease; }
    .lesson-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* 馬卡龍色課名 (運用 nth-child 變化) */
    .lesson-title { font-size: 1.4rem; font-weight: 900; padding: 0.8rem 1.2rem; border-radius: 15px; margin-bottom: 0.5rem; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
    .color-1 { background: var(--macaron-pink); }
    .color-2 { background: var(--macaron-blue); color: #5D5D5D; text-shadow: none; }
    .color-3 { background: var(--macaron-yellow); color: #5D5D5D; text-shadow: none; }
    .color-4 { background: var(--macaron-green); color: #5D5D5D; text-shadow: none; }
    .color-5 { background: var(--macaron-purple); }

    .lesson-summary { width: 100%; border: 2px dashed var(--macaron-blue); border-radius: 15px; padding: 0.8rem; font-size: 0.9rem; color: var(--text-main); background: #fafafa; margin-bottom: 1rem; min-height: 60px; resize: vertical; }

    /* === 生字卡與滑動刪除 === */
    .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .swipe-wrapper { position: relative; overflow: hidden; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); background: var(--danger); }
    .char-card { position: relative; background: #fff; padding: 1.2rem; border-radius: 20px; z-index: 2; transition: transform 0.3s cubic-bezier(0.1, 0.7, 0.1, 1); border: 2px solid #fff; }
    .char-card.swiped { transform: translateX(-70px); }
    
    .delete-btn-bg { position: absolute; right: 0; top: 0; bottom: 0; width: 70px; display: flex; align-items: center; justify-content: center; z-index: 1; }
    .delete-circle { width: 40px; height: 40px; background: #fff; color: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }

    .char-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .char-big { font-size: 2.2rem; font-weight: 900; color: #D48C9E; background: #FFF0F5; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
    .char-pinyin { font-size: 1.1rem; font-weight: 800; color: var(--text-main); }
    .char-radical { font-size: 0.85rem; color: #fff; background: var(--macaron-blue); padding: 2px 8px; border-radius: 10px; margin-left: 5px; }
    .audio-btn { font-size: 1.2rem; background: none; border: none; cursor: pointer; }
    
    .char-terms { font-size: 0.95rem; font-weight: 700; color: var(--text-main); margin-top: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px dashed var(--border-color); }
    .char-note { width: 100%; border: none; background: #FFF9E6; padding: 0.5rem; border-radius: 8px; font-size: 0.85rem; margin-top: 0.5rem; color: #8B7355; outline: none; resize: none; overflow: hidden;}
    .char-note::placeholder { color: #D2B48C; }

    /* === 聽寫測驗系統 === */
    .dictation-panel { background: #fff; padding: 1.5rem; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
    .play-circle { width: 80px; height: 80px; border-radius: 50%; background: var(--macaron-pink); color: white; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 1rem auto; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 183, 178, 0.5); transition: 0.3s; }
    .play-circle:active { transform: scale(0.9); }
    #dictation-status { font-size: 1.2rem; font-weight: 800; color: var(--text-main); margin-top: 1rem; min-height: 30px; }

    /* === 田字格產生器 (波波注音風格) === */
    .grid-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; background: #fff; padding: 2rem; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .grid-word-group { display: flex; flex-direction: column; align-items: center; gap: 5px; margin-bottom: 15px;}
    .grid-word-text { font-size: 1rem; font-weight: 800; color: #333; }
    
    .tian-wrapper { display: flex; border: 1.5px solid #000; background: #fff; }
    .tian-char-box { width: 50px; height: 50px; position: relative; border-right: 1px solid #000; }
    /* 田字格虛線 */
    .tian-char-box::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; border-top: 1px dashed #999; }
    .tian-char-box::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; border-left: 1px dashed #999; }
    /* 注音格 */
    .tian-zhuyin-box { width: 20px; height: 50px; position: relative; }
    .tian-zhuyin-box::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; border-left: 1px dotted #aaa; }

    /* === 字典模組 === */
    .dict-search-box { background: #fff; padding: 1.5rem; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 1rem; }
    .dict-search-title { display: flex; align-items: center; gap: 5px; font-weight: 800; color: var(--macaron-purple); margin-bottom: 1rem; font-size: 1.1rem;}
    .dict-input-wrap { display: flex; gap: 10px; }
    .dict-input { flex-grow: 1; border: 2px solid var(--macaron-purple); border-radius: 12px; padding: 0.6rem; outline: none; }
    .dictionary-popup { background: #fff; padding: 1rem; border-radius: 15px; border: 2px solid var(--macaron-blue); box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-top: 1rem; }
    .hidden { display: none !important; }

    /* === 列印設定 === */
    @media print {
      body { background: #fff !important; }
      header, nav, .filter-bar, .no-print, .btn, .swipe-wrapper { display: none !important; }
      main { padding: 0 !important; }
      .grid-container { box-shadow: none; padding: 0; }
      /* 強制印出黑線 */
      .tian-wrapper { border: 1.5px solid #000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .tian-char-box { border-right: 1px solid #000 !important; }
      .tian-char-box::before, .tian-char-box::after { border-color: #000 !important; opacity: 0.4; }
      .tian-zhuyin-box::after { border-color: #000 !important; opacity: 0.4; }
    }
  </style>
</head>
<body>

  <!-- === 標題區塊 === -->
  <header class="no-print">
    <div class="header-container">
      <h1>國語線上字典學習系統</h1>
      <div class="subtitle">「詳細生字.成語圈詞.真人朗讀」</div>
      
      <div class="meta-input-group">
        <input type="text" id="custom-title-input" class="meta-input" value="五年級(上) 康軒版 國語生字" onblur="saveMetaData()">
        
        <select id="title-selector" class="meta-select" onchange="updateTitleFromSelect()">
          <option value="">--快速選填年級--</option>
          <option value="一年級(上) 康軒版 國語生字">1年級 (上) 康軒</option>
          <option value="一年級(下) 康軒版 國語生字">1年級 (下) 康軒</option>
          <option value="二年級(上) 翰林版 國語生字">2年級 (上) 翰林</option>
          <option value="二年級(下) 翰林版 國語生字">2年級 (下) 翰林</option>
          <option value="三年級(上) 南一版 國語生字">3年級 (上) 南一</option>
          <option value="三年級(下) 南一版 國語生字">3年級 (下) 南一</option>
          <option value="五年級(上) 康軒版 國語生字">5年級 (上) 康軒</option>
        </select>

        <!-- 🔊 語速調整選單 -->
        <select id="speech-rate-selector" class="meta-select" style="border-color: var(--macaron-green);" title="調整語音朗讀速度">
          <option value="0.5">🐢 慢速 (0.5x)</option>
          <option value="0.75" selected>🚶 稍慢 (0.75x)</option>
          <option value="1.0">🏃 正常 (1.0x)</option>
          <option value="1.25">🐇 稍快 (1.25x)</option>
        </select>
      </div>
    </div>
  </header>

  <!-- === 導覽列 === -->
  <nav class="no-print">
    <div class="nav-container">
      <button class="nav-btn active" onclick="switchTab('tab-lesson')">📖 課文生字與圈詞</button>
      <button class="nav-btn" onclick="switchTab('tab-dict')">🔍 線上查字典</button>
      <button class="nav-btn" onclick="switchTab('tab-test')">✍️ 聽寫測驗系統</button>
      <button class="nav-btn" onclick="switchTab('tab-grid')">🖨️ 田字格列印</button>
      <button class="nav-btn" onclick="switchTab('tab-backup')">⚙️ 備份與還原</button>
    </div>
  </nav>

  <main>
    <!-- === 視圖 1: 課文生字與圈詞 === -->
    <div id="tab-lesson" class="tab-content active">
      <div class="filter-bar no-print">
        <span style="font-weight: 800; color: var(--macaron-purple);">快速跳轉：</span>
        <select id="lesson-selector" class="select-box" style="width: auto; flex-grow: 1;" onchange="showLesson(this.value)">
          <!-- JS 自動生成 1-12 課選單 -->
        </select>
      </div>
      <div id="lessons-container">
        <!-- JS 動態生成各課內容 -->
      </div>
    </div>

    <!-- === 視圖 2: 線上查字典 (依需求提供) === -->
    <div id="tab-dict" class="tab-content hidden">
      <div class="dict-search-box no-print">
        <div class="dict-search-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <span>線上國語字典（查詢詳盡解釋）</span>
        </div>
        <div class="dict-input-wrap">
          <input type="text" id="dict-query-input" placeholder="輸入想查詢的單字，例如「瘧」" class="dict-input" onkeypress="if(event.key==='Enter') searchDict()">
          <button onclick="searchDict()" class="btn" style="background-color: var(--macaron-purple); color:#fff; border-color:var(--macaron-purple);">線上查字</button>
        </div>
      </div>
      <div id="dict-result-popup" class="dictionary-popup hidden no-print">
        <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:10px; color:#3730a3;">
          <span>🔍 教育部字詞釋義結果：</span>
          <button onclick="closeDictPopup()" style="color:#999; font-size:12px; background:none; border:none; cursor:pointer;">[關閉]</button>
        </div>
        <div id="dict-result-content" style="max-height: 300px; overflow-y:auto; line-height:1.6; font-size:0.95rem; color:#444;"></div>
      </div>
    </div>

    <!-- === 視圖 3: 聽寫測驗系統 === -->
    <div id="tab-test" class="tab-content hidden">
      <div class="dictation-panel no-print">
        <h2 style="color: var(--macaron-pink); margin-bottom: 0.5rem;">自動聽寫系統</h2>
        <p style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 1rem;">選擇課次後按下播放，系統會自動將每個圈詞朗讀兩次，間隔 5 秒鐘供孩子書寫。</p>
        
        <select id="test-lesson-selector" class="select-box" style="max-width: 300px; margin: 0 auto 1rem auto; display: block;" onchange="updateTestPreview()">
          <!-- JS 自動生成 -->
        </select>

        <div id="test-preview" style="font-size: 0.9rem; color: #888; margin-bottom: 1rem; min-height: 40px;"></div>

        <div class="play-circle" onclick="startDictation()" id="play-btn">▶️</div>
        <button class="btn btn-blue" onclick="stopDictation()" style="margin-top: 10px;">⏹️ 停止測驗</button>
        
        <div id="dictation-status">準備就緒</div>
      </div>
    </div>

    <!-- === 視圖 4: 田字格列印 === -->
    <div id="tab-grid" class="tab-content hidden">
      <div class="no-print" style="text-align: center; margin-bottom: 1rem;">
        <h2 style="color: var(--macaron-blue); margin-bottom: 0.5rem;">波波注音風格 - 聽寫格列印</h2>
        <p style="font-size:0.9rem; color:var(--text-light); margin-bottom: 1rem;">您可以手動輸入想要產生格子的語詞，每個字會產生一個「田字格+右側注音格」。</p>
        <input type="text" id="grid-input" class="input-box" placeholder="輸入語詞 (如: 蚊帳 瘧疾)" style="max-width: 400px; display: inline-block;">
        <button class="btn btn-green" onclick="generateGrid()">生成格子</button>
        <button class="btn btn-pink" onclick="window.print()" style="margin-left: 10px;">🖨️ 列印</button>
      </div>
      
      <div id="grid-render-area" class="grid-container">
        <!-- 格子渲染區 -->
      </div>
    </div>

    <!-- === 視圖 5: 備份與還原 === -->
    <div id="tab-backup" class="tab-content hidden no-print">
      <div class="dictation-panel">
        <h2 style="color: var(--macaron-green); margin-bottom: 1rem;">⚙️ 資料備份與還原</h2>
        <p style="font-size:0.9rem; color:#666; margin-bottom: 1rem;">所有的修改（課名、大意、備註）都自動儲存在這台裝置中。若要轉移到其他手機或電腦，請使用匯出與匯入功能。</p>
        <button class="btn btn-blue" onclick="exportData()">📤 匯出資料 (JSON)</button>
        <button class="btn btn-pink" onclick="document.getElementById('import-file').click()">📥 匯入資料 (JSON)</button>
        <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importData(event)">
        
        <div style="margin-top: 3rem; padding-top: 1rem; border-top: 1px dashed #ccc;">
          <button class="btn btn-yellow" onclick="resetToDefault()">⚠️ 恢復原始預設資料</button>
        </div>
      </div>
    </div>

  </main>

  <script>
    // === 預設資料庫 (康軒五上 1-12課) ===
    const defaultData = {
      metaTitle: "五年級(上) 康軒版 國語生字",
      lessons: [
        {
          id: 1,
          title: "第一課： 蚊帳大使",
          summary: "這是一篇關於非洲瘧疾與蚊帳的故事，提醒我們要懂得感恩與助人。",
          chars: [
            { char: "蚊", zhuyin: "ㄨㄣˊ", radical: "虫", terms: "蚊子，蚊帳", note: "" },
            { char: "帳", zhuyin: "ㄓㄤˋ", radical: "巾", terms: "蚊帳，帳篷", note: "" },
            { char: "洲", zhuyin: "ㄓㄡ", radical: "水", terms: "非洲，亞洲", note: "" },
            { char: "瘧", zhuyin: "ㄋㄩㄝˋ", radical: "疒", terms: "瘧疾，瘧蚊", note: "" },
            { char: "疾", zhuyin: "ㄐㄧˊ", radical: "疒", terms: "疾病，疾走", note: "" },
            { char: "死", zhuyin: "ㄙˇ", radical: "歹", terms: "死亡，死板", note: "" },
            { char: "叮", zhuyin: "ㄉㄧㄥ", radical: "口", terms: "叮咬，叮嚀", note: "" },
            { char: "鼓", zhuyin: "ㄍㄨˇ", radical: "鼓", terms: "鼓起，鼓勵", note: "" },
            { char: "募", zhuyin: "ㄇㄨˋ", radical: "力", terms: "募集，募款", note: "" },
            { char: "集", zhuyin: "ㄐㄧˊ", radical: "隹", terms: "聚集，集中", note: "" },
            { char: "寄", zhuyin: "ㄐㄧˋ", radical: "宀", terms: "寄信，寄託", note: "" },
            { char: "贈", zhuyin: "ㄗㄥˋ", radical: "貝", terms: "贈送，捐贈", note: "" },
            { char: "賣", zhuyin: "ㄇㄞˋ", radical: "貝", terms: "買賣，拍賣", note: "" },
            { char: "獎", zhuyin: "ㄐㄧㄤˇ", radical: "大", terms: "獎狀，獎金", note: "" },
            { char: "狀", zhuyin: "ㄓㄨㄤˋ", radical: "犬", terms: "狀態，獎狀", note: "" },
            { char: "誌", zhuyin: "ㄓˋ", radical: "言", terms: "雜誌，日誌", note: "" },
            { char: "基", zhuyin: "ㄐㄧ", radical: "土", terms: "基金會，基礎", note: "" },
            { char: "潛", zhuyin: "ㄑㄧㄢˊ", radical: "水", terms: "潛力，潛水", note: "" }
          ]
        },
        { id: 2, title: "第二課： 走過大地傷痕", summary: "請輸入課文大意...", chars: [] },
        { id: 3, title: "第三課： 迎向光的植物", summary: "請輸入課文大意...", chars: [] },
        { id: 4, title: "第四課： 智救羊群", summary: "請輸入課文大意...", chars: [] },
        { id: 5, title: "第五課： 送愛到南非", summary: "請輸入課文大意...", chars: [] },
        { id: 6, title: "第六課： 表演藝術饗宴", summary: "請輸入課文大意...", chars: [] },
        { id: 7, title: "第七課： 珍珠試煉", summary: "請輸入課文大意...", chars: [] },
        { id: 8, title: "第八課： 戰火下的溫情", summary: "請輸入課文大意...", chars: [] },
        { id: 9, title: "第九課： 探索植物的秘密", summary: "請輸入課文大意...", chars: [] },
        { id: 10, title: "第十課： 古詩選", summary: "請輸入課文大意...", chars: [] },
        { id: 11, title: "第十一課： 被遺忘的奇蹟", summary: "請輸入課文大意...", chars: [] },
        { id: 12, title: "第十二課： 魯賓遜漂流記", summary: "請輸入課文大意...", chars: [] }
      ]
    };

    let appData = {};

    // === 初始化 ===
    window.onload = () => {
      loadData();
      renderApp();
    };

    function loadData() {
      const stored = localStorage.getItem('MacaronChineseData');
      if (stored) {
        appData = JSON.parse(stored);
      } else {
        appData = JSON.parse(JSON.stringify(defaultData)); // Deep copy
      }
      document.getElementById('custom-title-input').value = appData.metaTitle || "";
    }

    function saveData() {
      localStorage.setItem('MacaronChineseData', JSON.stringify(appData));
    }

    // === 切換頁籤 ===
    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
      
      document.getElementById(tabId).classList.remove('hidden');
      event.target.classList.add('active');

      if(tabId === 'tab-test') updateTestPreview();
    }

    // === 頂部標題處理 ===
    function updateTitleFromSelect() {
      const sel = document.getElementById('title-selector');
      if (sel.value) {
        document.getElementById('custom-title-input').value = sel.value;
        saveMetaData();
      }
    }

    function saveMetaData() {
      appData.metaTitle = document.getElementById('custom-title-input').value;
      saveData();
    }

    // === 渲染課文與生字區 ===
    function renderApp() {
      const selector = document.getElementById('lesson-selector');
      const testSelector = document.getElementById('test-lesson-selector');
      const container = document.getElementById('lessons-container');
      
      selector.innerHTML = '';
      testSelector.innerHTML = '';
      container.innerHTML = '';

      appData.lessons.forEach((lesson, index) => {
        // 下拉選單
        selector.innerHTML += `<option value="lesson-${lesson.id}">${lesson.title}</option>`;
        testSelector.innerHTML += `<option value="${lesson.id}">${lesson.title}</option>`;

        // 馬卡龍色彩循環 (1到5)
        const colorClass = `color-${(index % 5) + 1}`;

        // 課文區塊
        let lessonHtml = `
          <div id="lesson-${lesson.id}" class="lesson-section ${index === 0 ? 'active' : ''}">
            <div class="lesson-title ${colorClass}" contenteditable="true" onblur="updateLessonTitle(${lesson.id}, this)">${lesson.title}</div>
            <textarea class="lesson-summary" placeholder="在此輸入課文大意..." onblur="updateLessonSummary(${lesson.id}, this)">${lesson.summary || ''}</textarea>
            
            <div class="char-grid">
              ${lesson.chars.map((charData, cIdx) => `
                <div class="swipe-wrapper" data-lesson="${lesson.id}" data-idx="${cIdx}">
                  <!-- 底層紅色垃圾桶 -->
                  <div class="delete-btn-bg">
                    <div class="delete-circle" onclick="deleteChar(${lesson.id}, ${cIdx})">🗑️</div>
                  </div>
                  <!-- 上層生字卡 (左右滑動) -->
                  <div class="char-card" id="card-${lesson.id}-${cIdx}">
                    <div class="char-header">
                      <div style="display:flex; align-items:center;">
                        <div class="char-big">${charData.char}</div>
                        <div style="margin-left: 10px;">
                          <div class="char-pinyin">${charData.zhuyin}</div>
                          <div class="char-radical">${charData.radical}部</div>
                        </div>
                      </div>
                      <button class="audio-btn" onclick="speakText('${charData.char}')">🔊</button>
                    </div>
                    <div class="char-terms">
                      圈詞：<span contenteditable="true" onblur="updateCharTerms(${lesson.id}, ${cIdx}, this)">${charData.terms}</span>
                      <button class="audio-btn" style="font-size:1rem;" onclick="speakText('${charData.terms.replace(/，|、/g, '')}')">▶️</button>
                    </div>
                    <textarea class="char-note" placeholder="✏️ 點此新增備註造句或 ⚠️ 易錯提醒..." onblur="updateCharNote(${lesson.id}, ${cIdx}, this)">${charData.note || ''}</textarea>
                  </div>
                </div>
              `).join('')}
            </div>
            ${lesson.chars.length === 0 ? `<p style="color:#aaa; text-align:center; padding: 2rem;">此課尚無生字資料，您可以透過匯入功能更新。</p>` : ''}
          </div>
        `;
        container.innerHTML += lessonHtml;
      });

      initSwipeEvents();
      updateTestPreview();
    }

    // === 滑動切換課次 ===
    function showLesson(lessonId) {
      document.querySelectorAll('.lesson-section').forEach(el => el.classList.remove('active'));
      document.getElementById(lessonId).classList.add('active');
    }

    // === 滑動刪除邏輯 (Touch Events) ===
    function initSwipeEvents() {
      const cards = document.querySelectorAll('.char-card');
      cards.forEach(card => {
        let startX = 0;
        let currentX = 0;

        card.addEventListener('touchstart', e => {
          startX = e.touches[0].clientX;
          card.style.transition = 'none'; // 移除動畫讓跟隨手指更順
        });

        card.addEventListener('touchmove', e => {
          currentX = e.touches[0].clientX;
          let diff = currentX - startX;
          if (diff < 0 && diff > -80) { // 向左滑
            card.style.transform = `translateX(${diff}px)`;
          }
        });

        card.addEventListener('touchend', e => {
          card.style.transition = 'transform 0.3s cubic-bezier(0.1, 0.7, 0.1, 1)';
          let diff = currentX - startX;
          if (diff < -40) {
            card.classList.add('swiped');
            card.style.transform = ''; // 讓 class 的 transform 接管
          } else {
            card.classList.remove('swiped');
            card.style.transform = 'translateX(0)';
          }
        });
      });
    }

    // === 更新資料 ===
    function updateLessonTitle(id, el) {
      const lesson = appData.lessons.find(l => l.id === id);
      if (lesson) lesson.title = el.innerText;
      saveData();
    }
    function updateLessonSummary(id, el) {
      const lesson = appData.lessons.find(l => l.id === id);
      if (lesson) lesson.summary = el.value;
      saveData();
    }
    function updateCharTerms(lessonId, charIdx, el) {
      const lesson = appData.lessons.find(l => l.id === lessonId);
      if (lesson && lesson.chars[charIdx]) lesson.chars[charIdx].terms = el.innerText;
      saveData();
      updateTestPreview();
    }
    function updateCharNote(lessonId, charIdx, el) {
      const lesson = appData.lessons.find(l => l.id === lessonId);
      if (lesson && lesson.chars[charIdx]) {
        lesson.chars[charIdx].note = el.value;
        // 自動增高 textarea
        el.style.height = 'auto';
        el.style.height = (el.scrollHeight) + 'px';
      }
      saveData();
    }
    function deleteChar(lessonId, charIdx) {
      if(confirm("確定要刪除這個生字嗎？")) {
        const lesson = appData.lessons.find(l => l.id === lessonId);
        if (lesson) {
          lesson.chars.splice(charIdx, 1);
          saveData();
          renderApp();
          showLesson(`lesson-${lessonId}`);
        }
      }
    }

    // === 語音合成 (含語速調整) ===
    let synth = window.speechSynthesis;
    let isDictating = false;

    function speakText(text) {
      if(synth.speaking) synth.cancel();
      if(!text) return;
      
      let utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-TW';
      
      // 取得上方使用者選擇的語速
      const rateSelector = document.getElementById('speech-rate-selector');
      utterance.rate = rateSelector ? parseFloat(rateSelector.value) : 0.75;
      
      synth.speak(utterance);
      return new Promise(resolve => {
        utterance.onend = resolve;
        utterance.onerror = resolve; // 防止卡死
      });
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // === 聽寫系統 ===
    function updateTestPreview() {
      const lessonId = parseInt(document.getElementById('test-lesson-selector').value);
      const lesson = appData.lessons.find(l => l.id === lessonId);
      const preview = document.getElementById('test-preview');
      if (!lesson || lesson.chars.length === 0) {
        preview.innerText = "此課尚無圈詞資料。";
        return;
      }
      let termsArray = [];
      lesson.chars.forEach(c => {
        if(c.terms) {
          let splitTerms = c.terms.split(/[,，、]/).map(t => t.trim()).filter(t => t);
          termsArray.push(...splitTerms);
        }
      });
      preview.innerText = `準備聽寫內容：${termsArray.join('、')}`;
    }

    async function startDictation() {
      if (isDictating) return;
      
      const lessonId = parseInt(document.getElementById('test-lesson-selector').value);
      const lesson = appData.lessons.find(l => l.id === lessonId);
      const statusDiv = document.getElementById('dictation-status');
      
      if (!lesson || lesson.chars.length === 0) {
        alert("本課沒有圈詞可以測驗！");
        return;
      }

      let termsArray = [];
      lesson.chars.forEach(c => {
        if(c.terms) {
          let splitTerms = c.terms.split(/[,，、]/).map(t => t.trim()).filter(t => t);
          termsArray.push(...splitTerms);
        }
      });

      if(termsArray.length === 0) {
        alert("找不到有效圈詞！");
        return;
      }

      isDictating = true;
      document.getElementById('play-btn').style.background = '#ccc';
      
      statusDiv.innerText = "測驗即將開始...";
      await delay(2000);

      for (let i = 0; i < termsArray.length; i++) {
        if (!isDictating) break; // 若中途停止

        let term = termsArray[i];
        statusDiv.innerHTML = `<span style="color:var(--macaron-pink)">第 ${i+1} 題：</span> 正在朗讀...`;
        
        // 唸第一次
        await speakText(term);
        if (!isDictating) break;
        await delay(1000);
        
        // 唸第二次
        await speakText(term);
        if (!isDictating) break;

        // 等待5秒
        let countdown = 5;
        while(countdown > 0 && isDictating) {
          statusDiv.innerHTML = `<span style="color:var(--macaron-blue)">第 ${i+1} 題：</span> 請寫下語詞... (${countdown}秒)`;
          await delay(1000);
          countdown--;
        }
      }

      if (isDictating) {
        statusDiv.innerText = "🎉 測驗結束！好棒！";
        await speakText("測驗結束，大家辛苦了！");
      }
      
      stopDictation();
    }

    function stopDictation() {
      isDictating = false;
      synth.cancel();
      document.getElementById('play-btn').style.background = 'var(--macaron-pink)';
      document.getElementById('dictation-status').innerText = "測驗已停止。";
    }

    // === 田字格產生器 ===
    function generateGrid() {
      const input = document.getElementById('grid-input').value.trim();
      const area = document.getElementById('grid-render-area');
      area.innerHTML = '';

      if (!input) {
        alert("請先輸入語詞！");
        return;
      }

      // 支援多組語詞，用空格分開
      const words = input.split(' ').filter(w => w);

      words.forEach(word => {
        let groupDiv = document.createElement('div');
        groupDiv.className = 'grid-word-group';
        
        // 標題文字
        let textDiv = document.createElement('div');
        textDiv.className = 'grid-word-text no-print';
        textDiv.innerText = word;
        groupDiv.appendChild(textDiv);

        // 產生每個字的格子
        let rowDiv = document.createElement('div');
        rowDiv.style.display = 'flex';
        
        for (let char of word) {
          let tianWrapper = document.createElement('div');
          tianWrapper.className = 'tian-wrapper';
          
          let charBox = document.createElement('div');
          charBox.className = 'tian-char-box';
          
          let zhuyinBox = document.createElement('div');
          zhuyinBox.className = 'tian-zhuyin-box';

          tianWrapper.appendChild(charBox);
          tianWrapper.appendChild(zhuyinBox);
          rowDiv.appendChild(tianWrapper);
        }
        
        groupDiv.appendChild(rowDiv);
        area.appendChild(groupDiv);
      });
    }

    // === 線上字典 (Moedict API) ===
    async function searchDict() {
      const query = document.getElementById('dict-query-input').value.trim();
      if (!query) {
        alert("請輸入要查詢的單字或詞語！");
        return;
      }

      const popup = document.getElementById('dict-result-popup');
      const content = document.getElementById('dict-result-content');
      
      popup.classList.remove('hidden');
      content.innerHTML = `<span style="color:var(--macaron-blue)">連線至教育部萌典查詢中...</span>`;

      try {
        const response = await fetch(`https://www.moedict.tw/a/${encodeURIComponent(query)}.json`);
        if (!response.ok) throw new Error('Not found');
        const data = await response.json();
        
        let html = `<strong>【${data.title}】</strong><br>`;
        if(data.radical) html += `部首：${data.radical}部 | 筆畫：${data.stroke_count}畫<br>`;
        
        if (data.heteronyms && data.heteronyms.length > 0) {
          data.heteronyms.forEach(h => {
            if(h.bopomofo) html += `<span style="color:var(--macaron-pink)">[${h.bopomofo}]</span><br>`;
            if(h.definitions) {
              html += `<ul>`;
              h.definitions.forEach(def => {
                html += `<li>${def.def}</li>`;
              });
              html += `</ul>`;
            }
          });
        }
        content.innerHTML = html.replace(/`|~/g, ''); // 移除萌典自帶的特殊符號
      } catch (err) {
        content.innerHTML = `<span style="color:var(--danger)">查無此字詞，或網路連線失敗。</span><br><br>
        <a href="https://dict.revised.moe.edu.tw/search.jsp?md=1&word=${encodeURIComponent(query)}" target="_blank" style="color:var(--macaron-purple); text-decoration:underline;">點此前往教育部國語辭典網頁查詢</a>`;
      }
    }

    function closeDictPopup() {
      document.getElementById('dict-result-popup').classList.add('hidden');
    }

    // === 備份與還原 ===
    function exportData() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData));
      const downloadAnchorNode = document.createElement('a');
      downloadAnchorNode.setAttribute("href",     dataStr);
      downloadAnchorNode.setAttribute("download", "國語字典學習系統備份.json");
      document.body.appendChild(downloadAnchorNode);
      downloadAnchorNode.click();
      downloadAnchorNode.remove();
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const importedData = JSON.parse(e.target.result);
          if(importedData.lessons) {
            appData = importedData;
            saveData();
            document.getElementById('custom-title-input').value = appData.metaTitle || "";
            renderApp();
            alert("資料還原成功！");
          } else {
            alert("檔案格式不正確！");
          }
        } catch (error) {
          alert("讀取檔案失敗！");
        }
      };
      reader.readAsText(file);
    }

    function resetToDefault() {
      if(confirm("警告：這將會清除您輸入的所有造句與修改，恢復為初始狀態，確定嗎？")) {
        appData = JSON.parse(JSON.stringify(defaultData));
        saveData();
        document.getElementById('custom-title-input').value = appData.metaTitle || "";
        renderApp();
        alert("已恢復預設資料。");
      }
    }
  </script>
