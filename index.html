<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>國語線上字典學習系統</title>
  
  <!-- 📌 iPhone 桌面 App 圖示 -->
  <link rel="apple-touch-icon" href="custom-icon.png">
  <link rel="icon" type="image/png" href="custom-icon.png">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800;900&display=swap');
    
    :root {
      /* 🍬 馬卡龍甜美色系 */
      --bg-color: #FFF5F7; 
      --card-bg: #FFFFFF;
      --m-pink: #FFB7B2;
      --m-blue: #B5EAD7;
      --m-green: #E2F0CB;
      --m-yellow: #FFDAC1;
      --m-purple: #CBAACB;
      --text-main: #5D5D5D;
      --border-color: #F8D8E8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    
    /* === 標題區塊 === */
    header { background: linear-gradient(135deg, #fff 0%, var(--border-color) 100%); padding: 1rem; border-bottom: 3px dashed var(--m-pink); text-align: center; }
    h1 { font-size: 1.4rem; font-weight: 900; color: #D48C9E; margin-bottom: 0.2rem; }
    .subtitle { font-size: 0.9rem; font-weight: 700; color: #A4A4A4; margin-bottom: 0.8rem; }
    
    .meta-controls { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; max-width: 800px; margin: 0 auto; }
    .meta-input { border: 2px solid var(--m-pink); border-radius: 20px; padding: 0.4rem 1rem; font-size: 1rem; font-weight: 800; color: var(--text-main); text-align: center; width: 100%; max-width: 300px; outline: none; background: #fff; }
    
    .select-wrap { position: relative; display: inline-block; }
    .select-wrap select { appearance: none; background: #fff; border: 2px solid var(--m-blue); border-radius: 20px; padding: 0.4rem 2rem 0.4rem 1rem; font-size: 0.9rem; font-weight: 700; color: var(--text-main); outline: none; cursor: pointer; }
    .select-wrap::after { content: '🔽'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; font-size: 0.7rem; }
    .select-wrap.speed select { border-color: var(--m-green); }

    /* === 導覽列 === */
    nav { background-color: white; border-bottom: 2px solid var(--border-color); position: sticky; top: 0; z-index: 50; }
    .nav-container { display: flex; overflow-x: auto; white-space: nowrap; scrollbar-width: none; max-width: 800px; margin: 0 auto; }
    .nav-container::-webkit-scrollbar { display: none; }
    .nav-btn { flex: 1; padding: 0.8rem 1rem; font-size: 0.95rem; font-weight: 800; background: none; border: none; border-bottom: 4px solid transparent; color: #A4A4A4; cursor: pointer; transition: 0.3s; }
    .nav-btn.active { color: #D48C9E; border-bottom-color: var(--m-pink); }

    main { max-width: 800px; margin: 0 auto; padding: 1rem; flex-grow: 1; width: 100%; }

    /* === 共用元件 === */
    .btn { padding: 0.5rem 1rem; font-size: 0.9rem; font-weight: 700; border-radius: 20px; border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: inline-flex; align-items: center; gap: 5px; }
    .btn:active { transform: scale(0.95); }
    .btn-pink { background-color: var(--m-pink); color: #fff; }
    .btn-blue { background-color: var(--m-blue); color: #5D5D5D; }
    .btn-green { background-color: var(--m-green); color: #5D5D5D; }
    .btn-yellow { background-color: var(--m-yellow); color: #5D5D5D; }
    .btn-purple { background-color: var(--m-purple); color: #fff; }
    
    .input-box, .textarea-box { width: 100%; border: 2px solid var(--border-color); border-radius: 12px; padding: 0.6rem; font-size: 1rem; outline: none; background: #fff; transition: 0.3s; font-family: inherit; }
    .input-box:focus, .textarea-box:focus { border-color: var(--m-pink); }
    .hidden { display: none !important; }

    /* === 課文生字區 === */
    .lesson-selector-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; background: #fff; padding: 10px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
    .lesson-title-display { font-size: 1.3rem; font-weight: 900; padding: 0.6rem 1rem; border-radius: 12px; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); width: 100%; text-align: center; margin-bottom: 0.5rem; }
    
    /* 摺疊批次匯入 */
    details.batch-details { background: #fff; border: 2px dashed var(--m-blue); border-radius: 15px; padding: 0.5rem 1rem; margin-bottom: 1rem; }
    details.batch-details summary { font-weight: 800; color: var(--text-main); cursor: pointer; outline: none; list-style: none; padding: 0.5rem 0; }
    details.batch-details summary::-webkit-details-marker { display: none; }

    /* 生字卡與滑動刪除 */
    .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .swipe-container { position: relative; overflow: hidden; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); background: #FFE0E0; }
    .delete-bg { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; display: flex; align-items: center; justify-content: center; background: #FF9AA2; color: white; font-size: 1.5rem; font-weight: bold; border-radius: 0 20px 20px 0; }
    .char-card { position: relative; background: #fff; padding: 1.2rem; border-radius: 20px; z-index: 2; transition: transform 0.3s ease; border: 2px solid #fff; }
    .char-card.swiped { transform: translateX(-80px); }
    
    .char-header { display: flex; align-items: center; gap: 10px; margin-bottom: 0.8rem; border-bottom: 2px dashed var(--border-color); padding-bottom: 0.8rem; }
    .char-big { font-size: 2.2rem; font-weight: 900; color: #D48C9E; background: #FFF0F5; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
    .char-info { flex-grow: 1; }
    .char-pinyin { font-size: 1.1rem; font-weight: 800; }
    .char-radical { font-size: 0.8rem; color: #fff; background: var(--m-blue); padding: 2px 6px; border-radius: 8px; margin-left: 5px; }
    
    /* === 聽寫與田字格區 === */
    .test-panel { background: #fff; padding: 1.5rem; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 1rem; }
    .play-controls { display: flex; gap: 10px; justify-content: center; margin: 1rem 0; flex-wrap: wrap; }
    
    /* 嚴格黑線田字格 (波波注音風) */
    .grid-container { display: flex; flex-wrap: wrap; gap: 12px; justify-content: flex-start; padding: 1rem 0; }
    .grid-word-group { display: flex; gap: 4px; margin-bottom: 10px; }
    
    .tian-box-wrap { display: flex; border: 1.5px solid #000; background: #fff; cursor: pointer; user-select: none; width: 68px; height: 50px; }
    
    .tian-char-cell { width: 50px; height: 50px; position: relative; border-right: 1px solid #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .tian-char-cell::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; border-top: 1px dashed #666; z-index: 1;}
    .tian-char-cell::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; border-left: 1px dashed #666; z-index: 1;}
    .tian-char-text { position: relative; z-index: 2; font-size: 1.8rem; font-weight: 900; color: #000; font-family: 'DFKai-SB', 'BiauKai', 'Noto Sans TC', sans-serif; transition: color 0.2s; }
    
    .tian-zy-cell { width: 18px; height: 50px; position: relative; display: flex; align-items: center; justify-content: center; }
    .tian-zy-cell::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; border-left: 1px dashed #999; z-index: 1;}
    .tian-zy-text { position: relative; z-index: 2; font-size: 0.8rem; font-weight: 700; color: #000; line-height: 1.1; letter-spacing: -1px; writing-mode: vertical-lr; transition: color 0.2s; }
    
    .text-hidden { color: transparent !important; }

    /* === 字典區 === */
    .dict-result { background: #fff; padding: 1.5rem; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-top: 1rem; min-height: 150px; }
    .dict-result-text { font-size: 1.3rem; line-height: 1.8; color: #333; margin-top: 1rem; }

    /* === 資源連結區 === */
    .link-card { background: #fff; padding: 1.2rem; border-radius: 20px; border: 2px solid var(--border-color); margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;}
    .link-info h3 { color: var(--m-purple); margin-bottom: 0.3rem; }

    /* === 列印優化 === */
    @media print {
      body { background: #fff !important; }
      header, nav, .no-print { display: none !important; }
      main { max-width: 100%; padding: 0; }
      .test-panel { box-shadow: none; padding: 0; border: none; }
      /* 強制印出黑線 */
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .tian-box-wrap { border: 1.5px solid #000 !important; }
      .tian-char-cell { border-right: 1px solid #000 !important; }
      .tian-char-cell::before, .tian-char-cell::after { border-color: #666 !important; }
      .tian-zy-cell::after { border-color: #999 !important; }
      .text-hidden { color: transparent !important; }
    }
  </style>
</head>
<body>

  <!-- 標題與設定區 -->
  <header class="no-print">
    <h1>國語線上字典學習系統</h1>
    <div class="subtitle">「詳細生字.成語圈詞.真人朗讀」</div>
    
    <div class="meta-controls">
      <input type="text" id="main-title" class="meta-input" value="五年級(上) 康軒版 國語生字" onchange="saveData()">
      
      <div class="select-wrap">
        <select id="sel-grade" onchange="autoFillTitle()">
          <option value="一">一年級</option>
          <option value="二">二年級</option>
          <option value="三">三年級</option>
          <option value="四">四年級</option>
          <option value="五" selected>五年級</option>
          <option value="六">六年級</option>
        </select>
      </div>
      <div class="select-wrap">
        <select id="sel-semester" onchange="autoFillTitle()">
          <option value="上">上學期</option>
          <option value="下">下學期</option>
        </select>
      </div>
      <div class="select-wrap">
        <select id="sel-publisher" onchange="autoFillTitle()">
          <option value="康軒">康軒</option>
          <option value="翰林">翰林</option>
          <option value="南一">南一</option>
        </select>
      </div>
      
      <div class="select-wrap speed">
        <select id="speech-speed" onchange="saveData()">
          <option value="0.5">🐢 0.5x</option>
          <option value="0.75" selected>🚶 0.75x</option>
          <option value="1.0">🏃 1.0x</option>
          <option value="1.25">🐇 1.25x</option>
        </select>
      </div>
    </div>
  </header>

  <!-- 導覽列 -->
  <nav class="no-print">
    <div class="nav-container">
      <button class="nav-btn active" onclick="switchTab('view-lessons')">📖 課文生字</button>
      <button class="nav-btn" onclick="switchTab('view-test')">✍️ 聽寫與田字格</button>
      <button class="nav-btn" onclick="switchTab('view-dict')">🔍 線上查字典</button>
      <button class="nav-btn" onclick="switchTab('view-links')">🔗 資源連結</button>
      <button class="nav-btn" onclick="switchTab('view-backup')">⚙️ 備份還原</button>
    </div>
  </nav>

  <main>
    <!-- 📖 視圖 1: 課文生字 -->
    <div id="view-lessons" class="tab-content">
      <div class="lesson-selector-bar no-print">
        <span style="font-weight: 800; color: var(--m-purple); white-space: nowrap;">切換單元：</span>
        <div class="select-wrap" style="width: 100%;">
          <select id="lesson-select" style="width: 100%;" onchange="renderLessonView()">
            <!-- JS 產生 1-12 課 -->
          </select>
        </div>
      </div>

      <div id="lesson-content-area">
        <!-- JS 渲染單課內容 -->
      </div>
    </div>

    <!-- ✍️ 視圖 2: 聽寫與田字格 -->
    <div id="view-test" class="tab-content hidden">
      <div class="test-panel no-print">
        <h2 style="color: var(--m-pink); margin-bottom: 0.5rem;">聽寫與田字格測驗系統</h2>
        <p style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 1rem;">
          下方文字框已自動帶入本課圈詞，您可以<b>自由修改、增減</b>。<br>
          按「播放聽寫」會每個詞唸2次並間隔5秒；下方格子點擊可隱藏國字或注音。
        </p>
        
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
          <div class="select-wrap" style="flex: 1;">
            <select id="test-lesson-select" style="width: 100%;" onchange="loadTestTerms()">
              <!-- JS 產生 -->
            </select>
          </div>
        </div>

        <textarea id="test-terms-input" class="textarea-box" rows="3" placeholder="請輸入要考試的圈詞，用逗號或空格隔開..." oninput="generateGrid()"></textarea>
        
        <div class="play-controls">
          <button class="btn btn-pink" id="btn-play" onclick="toggleDictation()">▶️ 播放聽寫 (間隔5秒)</button>
          <button class="btn btn-blue" onclick="window.print()">🖨️ 列印田字格</button>
        </div>
      </div>

      <div id="grid-render-area" class="grid-container print-show">
        <!-- JS 渲染田字格 -->
      </div>
    </div>

    <!-- 🔍 視圖 3: 線上查字典 -->
    <div id="view-dict" class="tab-content hidden">
      <div class="test-panel no-print">
        <h2 style="color: var(--m-purple); margin-bottom: 1rem;">教育部萌典即時查詢</h2>
        <div style="display: flex; gap: 10px;">
          <input type="text" id="dict-input" class="input-box" placeholder="輸入單字，例如：瘧" onkeypress="if(event.key==='Enter') searchMoedict()">
          <button class="btn btn-purple" style="white-space: nowrap;" onclick="searchMoedict()">線上查字</button>
        </div>
      </div>

      <div class="dict-result no-print">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem;">
          <h3 style="color: var(--m-green);">📖 查詢結果</h3>
          <button class="btn btn-blue" id="btn-copy" onclick="copyDictText()">📋 複製內容</button>
        </div>
        <div id="dict-output" class="dict-result-text">
          請在上方的輸入框輸入字詞開始查詢。
        </div>
      </div>
    </div>

    <!-- 🔗 視圖 4: 資源連結 -->
    <div id="view-links" class="tab-content hidden">
      <div class="test-panel no-print" style="margin-bottom: 1rem;">
        <h2 style="color: var(--m-blue); margin-bottom: 1rem;">新增實用連結</h2>
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
          <select id="link-subj" class="input-box" style="width: 100px; border-radius: 20px;">
            <option>國語</option><option>數學</option><option>社會</option><option>自然</option><option>英文</option><option>其它</option>
          </select>
          <input type="text" id="link-title" class="input-box" placeholder="標題" style="flex: 1; border-radius: 20px;">
          <input type="text" id="link-url" class="input-box" placeholder="網址 (https://...)" style="flex: 2; border-radius: 20px;">
          <button class="btn btn-blue" onclick="addLink()">➕ 新增</button>
        </div>
      </div>

      <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 1rem;" class="no-print">
        <button class="btn-dropdown active" onclick="filterLinks('All', this)">全部</button>
        <button class="btn-dropdown" onclick="filterLinks('國語', this)">國語</button>
        <button class="btn-dropdown" onclick="filterLinks('數學', this)">數學</button>
        <button class="btn-dropdown" onclick="filterLinks('社會', this)">社會</button>
        <button class="btn-dropdown" onclick="filterLinks('其它', this)">其它</button>
      </div>

      <div id="links-container">
        <!-- JS 渲染 -->
      </div>
    </div>

    <!-- ⚙️ 視圖 5: 備份與還原 -->
    <div id="view-backup" class="tab-content hidden no-print">
      <div class="test-panel" style="text-align: center;">
        <h2 style="color: var(--m-green); margin-bottom: 1rem;">資料備份與還原</h2>
        <p style="margin-bottom: 1.5rem; color: #888;">
          您的所有修改都會自動保存在此設備中。<br>
          若要換手機或分享給別人，請先「匯出」，再到另一台設備「匯入」。
        </p>
        <div style="display: flex; gap: 15px; justify-content: center; margin-bottom: 2rem;">
          <button class="btn btn-blue" onclick="exportJSON()">📤 匯出資料檔</button>
          <button class="btn btn-pink" onclick="document.getElementById('file-import').click()">📥 匯入資料檔</button>
          <input type="file" id="file-import" accept=".json" style="display:none" onchange="importJSON(event)">
        </div>
        <hr style="border: 0; border-top: 1px dashed #ccc; margin-bottom: 1rem;">
        <button class="btn btn-yellow" onclick="resetData()">⚠️ 恢復原始範例資料 (會清除修改)</button>
      </div>
    </div>

  </main>

  <script>
    // === 資料庫 ===
    const lessonNames = [
      "第一課：蚊帳大使", "第二課：走過大地傷痕", "第三課：迎向光的植物", "第四課：智救羊群",
      "第五課：送愛到南非", "第六課：表演藝術饗宴", "第七課：珍珠試煉", "第八課：戰火下的溫情",
      "第九課：探索植物的秘密", "第十課：古詩選", "第十一課：被遺忘的奇蹟", "第十二課：魯賓遜漂流記"
    ];

    const defaultData = {
      title: "五年級(上) 康軒版 國語生字",
      grade: "五", semester: "上", publisher: "康軒", speed: "0.75",
      lessons: Array.from({length: 12}, (_, i) => ({
        id: i + 1,
        title: lessonNames[i],
        summary: i === 0 ? "這是一篇關於非洲瘧疾與蚊帳的故事，提醒我們要懂得感恩與助人。" : "",
        batchText: i === 0 ? "蚊,ㄨㄣˊ,虫部,蚊子，蚊帳\n帳,ㄓㄤˋ,巾部,蚊帳，帳篷\n洲,ㄓㄡ,水部,非洲，亞洲\n瘧,ㄋㄩㄝˋ,疒部,瘧疾，瘧蚊\n疾,ㄐㄧˊ,疒部,疾病，疾走\n死,ㄙˇ,歹部,死亡，死板\n叮,ㄉㄧㄥ,口部,叮咬，叮嚀\n鼓,ㄍㄨˇ,鼓部,鼓起，鼓勵\n募,ㄇㄨˋ,力部,募集，募款\n集,ㄐㄧˊ,隹部,聚集，集中\n寄,ㄐㄧˋ,宀部,寄信，寄託\n贈,ㄗㄥˋ,貝部,贈送，捐贈\n賣,ㄇㄞˋ,貝部,買賣，拍賣\n獎,ㄐㄧㄤˇ,大部,獎狀，獎金\n狀,ㄓㄨㄤˋ,犬部,狀態，獎狀\n誌,ㄓˋ,言部,雜誌，日誌\n基,ㄐㄧ,土部,基金會，基礎\n潛,ㄑㄧㄢˊ,水部,潛力，潛水" : "",
        chars: i === 0 ? [
          { char: "蚊", zhuyin: "ㄨㄣˊ", rad: "虫部", terms: "蚊子，蚊帳", note: "注意右邊是文" },
          { char: "帳", zhuyin: "ㄓㄤˋ", rad: "巾部", terms: "蚊帳，帳篷", note: "" }
        ] : []
      })),
      links: [
        { id: 1, subj: "國語", title: "波波注音", desc: "參考田字格樣式", url: "https://bopodoc.com/worksheets/" }
      ]
    };

    let appData = null;
    let currentLessonId = 1;

    // === 核心初始化 ===
    window.onload = () => {
      const stored = localStorage.getItem('MandarinAppV4');
      if (stored) {
        try { appData = JSON.parse(stored); } catch(e) { appData = JSON.parse(JSON.stringify(defaultData)); }
      } else {
        appData = JSON.parse(JSON.stringify(defaultData));
      }
      
      // 若是第一次載入且第一課字陣列長度不符 batchText，強制解析一次第一課作為展示
      if(appData.lessons[0].chars.length <= 2 && appData.lessons[0].batchText.length > 50) {
          parseBatchText(1, appData.lessons[0].batchText);
      }

      initHeader();
      initSelectors();
      renderLessonView();
      loadTestTerms();
      renderLinks('All');
    };

    function saveData() {
      appData.title = document.getElementById('main-title').value;
      appData.grade = document.getElementById('sel-grade').value;
      appData.semester = document.getElementById('sel-semester').value;
      appData.publisher = document.getElementById('sel-publisher').value;
      appData.speed = document.getElementById('speech-speed').value;
      localStorage.setItem('MandarinAppV4', JSON.stringify(appData));
    }

    // === UI 綁定 ===
    function initHeader() {
      document.getElementById('main-title').value = appData.title;
      document.getElementById('sel-grade').value = appData.grade;
      document.getElementById('sel-semester').value = appData.semester;
      document.getElementById('sel-publisher').value = appData.publisher;
      document.getElementById('speech-speed').value = appData.speed || "0.75";
    }

    function autoFillTitle() {
      const g = document.getElementById('sel-grade').value;
      const s = document.getElementById('sel-semester').value;
      const p = document.getElementById('sel-publisher').value;
      document.getElementById('main-title').value = `${g}年級(${s}) ${p}版 國語生字`;
      saveData();
    }

    function initSelectors() {
      const selLesson = document.getElementById('lesson-select');
      const selTest = document.getElementById('test-lesson-select');
      selLesson.innerHTML = ''; selTest.innerHTML = '';
      
      appData.lessons.forEach(l => {
        let opt = `<option value="${l.id}">${l.title}</option>`;
        selLesson.innerHTML += opt;
        selTest.innerHTML += opt;
      });
      selLesson.value = currentLessonId;
      selTest.value = currentLessonId;
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.remove('hidden');
      event.target.classList.add('active');
    }

    // === 📖 課文生字渲染 ===
    function renderLessonView() {
      currentLessonId = parseInt(document.getElementById('lesson-select').value);
      const lesson = appData.lessons.find(l => l.id === currentLessonId);
      const container = document.getElementById('lesson-content-area');
      
      const colorClass = `lesson-${((lesson.id - 1) % 5) + 1}`; // 1~5 顏色循環
      
      let html = `
        <div class="lesson-title-display ${colorClass}">${lesson.title}</div>
        <textarea class="textarea-box" rows="2" placeholder="在此輸入課文大意 (會自動存檔)..." onblur="saveLessonData(${lesson.id}, 'summary', this.value)">${lesson.summary}</textarea>
        
        <details class="batch-details no-print" style="margin-top: 1rem;">
          <summary>➕ 展開批次匯入生字 (格式：生字,注音,部首,圈詞)</summary>
          <textarea id="batch-${lesson.id}" class="textarea-box" rows="4" style="margin-top:0.5rem;">${lesson.batchText}</textarea>
          <button class="btn btn-green" style="margin-top:0.5rem;" onclick="applyBatch(${lesson.id})">一鍵覆蓋匯入</button>
        </details>

        <div class="char-grid">
          ${lesson.chars.map((c, i) => `
            <div class="swipe-container" ontouchstart="ts(event)" ontouchend="te(event, this, ${lesson.id}, ${i})">
              <div class="delete-bg" onclick="deleteChar(${lesson.id}, ${i})">🗑️</div>
              <div class="char-card">
                <div class="char-header">
                  <div class="char-big">${c.char}</div>
                  <div class="char-info">
                    <div class="char-pinyin">${c.zhuyin} <span class="char-radical">${c.rad}</span></div>
                  </div>
                  <button class="btn btn-blue" style="padding: 0.3rem;" onclick="speak('${c.char}')">🔊</button>
                </div>
                <div style="font-size:0.85rem; color:var(--m-purple); font-weight:800; margin-bottom:5px;">圈詞與備註：</div>
                <input type="text" class="input-box" style="padding:0.4rem; font-size:0.9rem;" value="${c.terms}" onblur="saveCharData(${lesson.id}, ${i}, 'terms', this.value)">
                <input type="text" class="input-box" style="padding:0.4rem; font-size:0.85rem; margin-top:5px; background:#FFF9E6; border-color:#FFDAC1;" placeholder="⚠️ 易錯提醒或備註..." value="${c.note}" onblur="saveCharData(${lesson.id}, ${i}, 'note', this.value)">
              </div>
            </div>
          `).join('')}
        </div>
      `;
      container.innerHTML = html;
      
      // 同步聽寫測驗下拉單
      document.getElementById('test-lesson-select').value = currentLessonId;
      loadTestTerms();
    }

    function saveLessonData(lId, key, val) {
      const l = appData.lessons.find(x => x.id === lId);
      if(l) { l[key] = val; saveData(); }
    }
    
    function saveCharData(lId, cIdx, key, val) {
      const l = appData.lessons.find(x => x.id === lId);
      if(l && l.chars[cIdx]) { 
        l.chars[cIdx][key] = val; 
        saveData(); 
        if(key === 'terms' && lId === parseInt(document.getElementById('test-lesson-select').value)) {
          loadTestTerms(); // 若修改圈詞，即時更新聽寫框
        }
      }
    }

    function deleteChar(lId, cIdx) {
      const l = appData.lessons.find(x => x.id === lId);
      if(l) { l.chars.splice(cIdx, 1); saveData(); renderLessonView(); }
    }

    // 手機滑動刪除邏輯
    function ts(e) { e.currentTarget.dataset.x = e.touches[0].clientX; }
    function te(e, el, lId, cIdx) {
      let stX = parseFloat(el.dataset.x);
      let enX = e.changedTouches[0].clientX;
      let card = el.querySelector('.char-card');
      if (stX - enX > 40) { card.classList.add('swiped'); } 
      else { card.classList.remove('swiped'); }
    }

    // 批次處理
    function applyBatch(lId) {
      const text = document.getElementById(`batch-${lId}`).value.trim();
      parseBatchText(lId, text);
      renderLessonView();
    }
    
    function parseBatchText(lId, text) {
      const l = appData.lessons.find(x => x.id === lId);
      if(!l) return;
      l.batchText = text;
      l.chars = [];
      text.split('\n').forEach(line => {
        let p = line.split(',');
        if(p.length >= 1 && p[0].trim() !== '') {
          l.chars.push({
            char: p[0].trim(),
            zhuyin: p[1] ? p[1].trim() : "",
            rad: p[2] ? p[2].trim() : "",
            terms: p.slice(3).join('，').trim() || p[0].trim(),
            note: ""
          });
        }
      });
      saveData();
    }

    // === ✍️ 聽寫與田字格 ===
    function loadTestTerms() {
      const tId = parseInt(document.getElementById('test-lesson-select').value);
      const l = appData.lessons.find(x => x.id === tId);
      let termsArray = [];
      if(l) {
        l.chars.forEach(c => {
          if(c.terms) termsArray.push(...c.terms.split(/[,，、\s]+/).filter(Boolean));
        });
      }
      document.getElementById('test-terms-input').value = termsArray.join(' ');
      generateGrid();
    }

    function generateGrid() {
      const text = document.getElementById('test-terms-input').value;
      const terms = text.split(/[,，、\s]+/).filter(Boolean);
      const area = document.getElementById('grid-render-area');
      area.innerHTML = '';
      
      terms.forEach(term => {
        let group = document.createElement('div');
        group.className = 'grid-word-group';
        
        for(let char of term) {
          group.innerHTML += `
            <div class="tian-box-wrap">
              <div class="tian-char-cell" onclick="this.querySelector('.tian-char-text').classList.toggle('text-hidden')">
                <span class="tian-char-text">${char}</span>
              </div>
              <div class="tian-zy-cell" onclick="this.querySelector('.tian-zy-text').classList.toggle('text-hidden')">
                <span class="tian-zy-text"></span>
              </div>
            </div>
          `;
        }
        area.appendChild(group);
      });
    }

    // 聽寫語音控制
    let isPlaying = false;
    let synth = window.speechSynthesis;

    async function toggleDictation() {
      const btn = document.getElementById('btn-play');
      if(isPlaying) {
        isPlaying = false;
        synth.cancel();
        btn.innerText = "▶️ 播放聽寫 (間隔5秒)";
        btn.classList.remove('btn-green');
        btn.classList.add('btn-pink');
        return;
      }
      
      const terms = document.getElementById('test-terms-input').value.split(/[,，、\s]+/).filter(Boolean);
      if(terms.length === 0) return alert("請先輸入圈詞！");
      
      isPlaying = true;
      btn.innerText = "⏹️ 停止測驗";
      btn.classList.remove('btn-pink');
      btn.classList.add('btn-green');

      for(let i=0; i<terms.length; i++) {
        if(!isPlaying) break;
        
        // 唸兩次
        await playSpeech(terms[i]);
        if(!isPlaying) break;
        await sleep(1000);
        
        await playSpeech(terms[i]);
        if(!isPlaying) break;
        
        // 倒數 5 秒
        for(let s=5; s>0; s--) {
          if(!isPlaying) break;
          btn.innerText = `⏹️ 等待中... ${s}秒 (第 ${i+1}/${terms.length} 題)`;
          await sleep(1000);
        }
      }
      
      if(isPlaying) {
        await playSpeech("測驗結束，大家辛苦了！");
        toggleDictation(); // 重置按鈕
      }
    }

    function playSpeech(text) {
      return new Promise(resolve => {
        let u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-TW';
        u.rate = parseFloat(document.getElementById('speech-speed').value) || 0.75;
        u.onend = resolve;
        u.onerror = resolve;
        synth.speak(u);
      });
    }

    function speak(text) {
      synth.cancel();
      let u = new SpeechSynthesisUtterance(text);
      u.lang = 'zh-TW';
      u.rate = parseFloat(document.getElementById('speech-speed').value) || 0.75;
      synth.speak(u);
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // === 🔍 線上查字典 ===
    async function searchMoedict() {
      const q = document.getElementById('dict-input').value.trim();
      const out = document.getElementById('dict-output');
      if(!q) return;
      out.innerHTML = `<span style="color:var(--m-pink);">連線至教育部萌典中...</span>`;
      
      try {
        const res = await fetch(`https://www.moedict.tw/a/${encodeURIComponent(q)}.json`);
        if(!res.ok) throw new Error('not found');
        const data = await res.json();
        
        let html = `<strong>【${data.title}】</strong><br>`;
        if(data.radical) html += `<span style="font-size:1rem; color:#888;">部首：${data.radical}部 | 筆畫：${data.stroke_count}畫</span><br><br>`;
        
        if(data.heteronyms) {
          data.heteronyms.forEach(h => {
            if(h.bopomofo) html += `<span style="color:var(--m-pink); font-weight:800;">[${h.bopomofo}]</span><br>`;
            if(h.definitions) {
              h.definitions.forEach((d, idx) => {
                html += `${idx+1}. ${d.def.replace(/`|~/g, '')}<br>`;
              });
            }
          });
        }
        out.innerHTML = html;
      } catch(e) {
        out.innerHTML = `<span style="color:red;">查無此字詞，請確認輸入是否正確。</span><br><br><a href="https://dict.revised.moe.edu.tw/search.jsp?md=1&word=${encodeURIComponent(q)}" target="_blank" class="btn btn-pink">前往官網查詢</a>`;
      }
    }

    function copyDictText() {
      const text = document.getElementById('dict-output').innerText;
      navigator.clipboard.writeText(text).then(() => {
        const b = document.getElementById('btn-copy');
        b.innerText = "✅ 已複製";
        setTimeout(() => b.innerText = "📋 複製內容", 2000);
      });
    }

    // === 🔗 資源連結 ===
    function renderLinks(filterSubj) {
      const container = document.getElementById('links-container');
      container.innerHTML = '';
      appData.links.forEach((l, i) => {
        if(filterSubj === 'All' || l.subj === filterSubj) {
          container.innerHTML += `
            <div class="link-card">
              <div class="link-info">
                <span style="font-size:0.75rem; background:var(--m-green); padding:2px 8px; border-radius:10px; font-weight:800;">${l.subj}</span>
                <h3>${l.title}</h3>
                <p style="font-size:0.85rem; color:#888;">${l.desc}</p>
              </div>
              <div style="display:flex; flex-direction:column; gap:5px;">
                <a href="${l.url}" target="_blank" class="btn btn-pink" style="text-decoration:none;">前往</a>
                <button class="btn" style="font-size:0.7rem; padding:0.3rem;" onclick="deleteLink(${i})">刪除</button>
              </div>
            </div>
          `;
        }
      });
    }

    function filterLinks(subj, btnEl) {
      document.querySelectorAll('#view-links .btn-dropdown').forEach(b => b.classList.remove('active'));
      btnEl.classList.add('active');
      renderLinks(subj);
    }

    function addLink() {
      const s = document.getElementById('link-subj').value;
      const t = document.getElementById('link-title').value.trim();
      const u = document.getElementById('link-url').value.trim();
      if(!t || !u) return alert('標題與網址必填！');
      appData.links.push({ id: Date.now(), subj: s, title: t, desc: "", url: u });
      saveData();
      document.getElementById('link-title').value = '';
      document.getElementById('link-url').value = '';
      renderLinks('All');
      document.querySelector('#view-links .btn-dropdown').classList.add('active'); // reset filter to all
    }

    function deleteLink(idx) {
      if(confirm('確定刪除此連結？')) {
        appData.links.splice(idx, 1);
        saveData();
        renderLinks('All');
      }
    }

    // === ⚙️ 備份與還原 ===
    function exportJSON() {
      saveData();
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData));
      const a = document.createElement('a');
      a.href = dataStr;
      a.download = "國語學習系統備份.json";
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    function importJSON(e) {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        try {
          appData = JSON.parse(evt.target.result);
          saveData();
          alert("資料還原成功！");
          location.reload(); // 重新整理頁面以套用新資料
        } catch(err) { alert("檔案格式錯誤！"); }
      };
      reader.readAsText(file);
    }

    function resetData() {
      if(confirm("警告：將清除您所有的修改內容，恢復為系統預設值。確定繼續嗎？")) {
        localStorage.removeItem('MandarinAppV4');
        location.reload();
      }
    }
  </script>
</body>
